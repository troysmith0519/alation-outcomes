name: Daily Outcomes Update

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC = 8:00 AM ET / 5:00 AM PT
  workflow_dispatch:         # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Build updated index.html
        env:
          ALATION_BASE_URL:      ${{ secrets.ALATION_BASE_URL }}
          ALATION_REFRESH_TOKEN: ${{ secrets.ALATION_REFRESH_TOKEN }}
          ALATION_USER_ID:       ${{ secrets.ALATION_USER_ID }}
          ALATION_QUERY_ID:      ${{ secrets.ALATION_QUERY_ID }}
        run: python build.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update outcomes — $(date -u '+%Y-%m-%d')"
          git push
